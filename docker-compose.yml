# Docker Compose for mtc-bridge with PostgreSQL state store.
#
# This compose file supports local-only development by default. DigiCert CA
# MariaDB/API environment variables are optional when config.yaml has
# ca_db.enabled: false and local_ca.enabled: true. It provides:
#   - mtc-bridge service
#   - PostgreSQL 16 state store
#
# Usage:
#   docker compose up -d
#   docker compose logs -f mtc-bridge
services:
  # PostgreSQL state store for mtc-bridge
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mtcbridge
      POSTGRES_USER: mtcbridge
      POSTGRES_PASSWORD: ${MTC_POSTGRES_PASSWORD:-mtcbridge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mtcbridge" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mtc-internal

  # MTC Bridge service
  mtc-bridge:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MTC_STATE_DB_HOST: postgres
      MTC_STATE_DB_PORT: "5432"
      MTC_STATE_DB_USERNAME: mtcbridge
      MTC_STATE_DB_PASSWORD: ${MTC_POSTGRES_PASSWORD:-mtcbridge}
      MTC_STATE_DB_DATABASE: mtcbridge
      MTC_CADB_HOST: ${MTC_CADB_HOST:-ca-db}
      MTC_CADB_PORT: ${MTC_CADB_PORT:-3306}
      MTC_CADB_USERNAME: ${MTC_CADB_USERNAME:-}
      MTC_CADB_PASSWORD: ${MTC_CADB_PASSWORD:-}
      MTC_CADB_DATABASE: ${MTC_CADB_DATABASE:-digicert_ca}
      MTC_COSIGNER_KEY_FILE: /etc/mtc-bridge/keys/cosigner.key
      MTC_LOCAL_CA_KEY: /etc/mtc-bridge/keys/local-ca.key
      MTC_LOCAL_CA_CERT: /etc/mtc-bridge/keys/local-ca.pem
    volumes:
      - ./config.yaml:/etc/mtc-bridge/config.yaml:ro
      - ./keys:/etc/mtc-bridge/keys:ro
      - ./acme-cert.pem:/etc/mtc-bridge/acme-cert.pem:ro
      - ./acme-key.pem:/etc/mtc-bridge/acme-key.pem:ro
    ports:
      - "${MTC_HTTP_PORT:-8080}:8080"
    networks:
      - mtc-internal
    restart: unless-stopped

  # ACME server (standalone)
  acme-server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MTC_STATE_DB_HOST: postgres
      MTC_STATE_DB_PORT: "5432"
      MTC_STATE_DB_USERNAME: mtcbridge
      MTC_STATE_DB_PASSWORD: ${MTC_POSTGRES_PASSWORD:-mtcbridge}
      MTC_STATE_DB_DATABASE: mtcbridge
      MTC_CADB_HOST: ${MTC_CADB_HOST:-ca-db}
      MTC_CADB_PORT: ${MTC_CADB_PORT:-3306}
      MTC_CADB_USERNAME: ${MTC_CADB_USERNAME:-}
      MTC_CADB_PASSWORD: ${MTC_CADB_PASSWORD:-}
      MTC_CADB_DATABASE: ${MTC_CADB_DATABASE:-digicert_ca}
      CA_API_KEY: ${CA_API_KEY:-}
      CA_ID: ${CA_ID:-}
      CA_TEMPLATE_ID: ${CA_TEMPLATE_ID:-}
      CA_URL: ${CA_URL:-http://localhost}
      MTC_BRIDGE_URL: http://mtc-bridge:8080
      MTC_COSIGNER_KEY_FILE: /etc/mtc-bridge/keys/cosigner.key
      MTC_LOCAL_CA_KEY: /etc/mtc-bridge/keys/local-ca.key
      MTC_LOCAL_CA_CERT: /etc/mtc-bridge/keys/local-ca.pem
    command: [ "-config", "/etc/mtc-bridge/config.yaml" ]
    volumes:
      - ./config.yaml:/etc/mtc-bridge/config.yaml:ro
      - ./keys:/etc/mtc-bridge/keys:ro
      - ./acme-cert.pem:/etc/mtc-bridge/acme-cert.pem:ro
      - ./acme-key.pem:/etc/mtc-bridge/acme-key.pem:ro
    ports:
      - "8443:8443"
    networks:
      - mtc-internal
    restart: unless-stopped

volumes:
  pgdata:


networks:
  mtc-internal:
    driver: bridge
