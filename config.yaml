# MTC Bridge — Local Development Configuration

log:
  name: "mtc-bridge-dev"
  origin: "localhost/mtc-bridge"
  batch_size: 100

state_db:
  host: "${MTC_STATE_DB_HOST:-localhost}"
  port: ${MTC_STATE_DB_PORT:-5432}
  database: "${MTC_STATE_DB_DATABASE:-mtcbridge}"
  username: "${MTC_STATE_DB_USERNAME:-mtcbridge}"
  password: "${MTC_STATE_DB_PASSWORD:-mtcbridge}"
  ssl_mode: "disable"
  max_open_conns: 10
  max_idle_conns: 3
  conn_max_lifetime: 5m

ca_db:
  enabled: false
  host: "${MTC_CADB_HOST:-localhost}"
  port: ${MTC_CADB_PORT:-3306}
  database: "${MTC_CADB_DATABASE:-digicert_ca}"
  username: "${MTC_CADB_USERNAME}"
  password: "${MTC_CADB_PASSWORD}"
  issuer_id: ""  # all CAs

http:
  addr: ":8080"
  read_timeout: 10s
  write_timeout: 30s
  tile_cache_ttl: 24h
  checkpoint_cache_ttl: 5s

watcher:
  poll_interval: 10s
  revocation_poll_interval: 30s
  checkpoint_interval: 60s
  batch_size: 500

cosigner:
  key_file: "${MTC_COSIGNER_KEY_FILE:-keys/cosigner-mldsa44.key}"
  key_id: "mtc-bridge-dev"
  algorithm: "mldsa44"

logging:
  level: "info"
  format: "json"

assertion_issuer:
  # enabled: true  # default; set false to disable
  batch_size: 5000
  concurrency: 4
  staleness_threshold: 5
  # webhooks:
  #   - url: "https://example.com/mtc-webhook"
  #     pattern: "*.example.com"
  #     secret: "webhook-secret"

landmarks:
  enabled: true
  interval: 1m
  max_active_landmarks: 0  # 0 = publish all landmarks

revocation:
  admin_token: "${MTC_REVOCATION_ADMIN_TOKEN:-}"

local_ca:
  enabled: true
  mtc_mode: true
  mtc_profile: standalone
  key_file: "${MTC_LOCAL_CA_KEY:-keys/local-ca.key}"
  cert_file: "${MTC_LOCAL_CA_CERT:-keys/local-ca.pem}"
  validity: 8760h    # 1 year
  organization: "MTC HSLU CA"
  country: "CH"

acme:
  enabled: true
  addr: ":8443"
  external_url: "https://localhost:8443"
  ca_url: "${CA_URL:-http://localhost}"
  ca_api_key: "${CA_API_KEY}"
  ca_id: "${CA_ID:-}"
  template_id: "${CA_TEMPLATE_ID:-}"
  mtc_bridge_url: "${MTC_BRIDGE_URL:-http://localhost:8080}"
  order_expiry: 24h
  assertion_timeout: 5m
  assertion_poll_interval: 5s
  auto_approve_challenge: true  # skip http-01 for internal CA

  tls_cert: "./acme-keys/acme-cert.pem"
  tls_key: "./acme-keys/acme-key.pem"
